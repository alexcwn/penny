<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Archive Analyzer</title>
    <style>
        :root {
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }
        body.light-mode {
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: var(--text-primary); }
        body.light-mode { background: #f8fafc; color: #1e293b; }
        .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); }
        body.light-mode .header { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); border-bottom: 1px solid #e2e8f0; }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .logo h1 { font-size: 1.25rem; font-weight: 600; }
        body.light-mode .logo h1 { color: #1e293b; }
        .archive-info { display: flex; gap: 2rem; font-size: 0.875rem; }
        .archive-info-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .archive-info-label { color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
        .archive-info-value { color: var(--text-primary); font-weight: 500; }
        body.light-mode .archive-info-value { color: #1e293b; }
        .theme-toggle { background: #334155; border: none; color: var(--text-primary); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 1.25rem; transition: all 0.3s; margin-left: 1rem; }
        .theme-toggle:hover { background: #475569; transform: scale(1.1); }
        body.light-mode .theme-toggle { background: #e2e8f0; color: #1e293b; }
        body.light-mode .theme-toggle:hover { background: #cbd5e1; }
        .container { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 73px); transition: grid-template-columns 0.3s ease; }
        .container.sidebar-collapsed { grid-template-columns: 60px 1fr; }
        .sidebar { background: #1e293b; border-right: 1px solid #334155; padding: 1.5rem; overflow-y: auto; overflow-x: hidden; transition: padding 0.3s ease, background 0.3s, border-color 0.3s; }
        body.light-mode .sidebar { background: #ffffff; border-right: 1px solid #e2e8f0; }
        .sidebar.collapsed { padding: 1rem 0.5rem; }
        .sidebar-toggle { position: absolute; top: 1rem; right: -12px; width: 24px; height: 24px; background: #3b82f6; border: 2px solid #334155; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.75rem; z-index: 10; transition: all 0.3s ease; }
        body.light-mode .sidebar-toggle { border-color: #e2e8f0; }
        .sidebar-toggle:hover { background: #2563eb; transform: scale(1.1); }
        .nav-section { margin-bottom: 2rem; }
        .nav-section-title { font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 600; margin-bottom: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.3s; }
        body.light-mode .nav-section-title { color: #475569; }
        .sidebar.collapsed .nav-section-title { opacity: 0; height: 0; margin: 0; }
        .nav-item { padding: 0.75rem; margin-bottom: 0.5rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.75rem; color: #cbd5e1; white-space: nowrap; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 0.75rem 0.5rem; }
        .nav-item-text { transition: opacity 0.2s ease; }
        .sidebar.collapsed .nav-item-text { opacity: 0; width: 0; overflow: hidden; }
        .nav-item:hover { background: #334155; color: #fff; }
        body.light-mode .nav-item { color: #475569; }
        body.light-mode .nav-item:hover { background: #f1f5f9; color: #1e293b; }
        .nav-item.active { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); color: white; font-weight: 500; }
        .main-content { padding: 2rem; overflow-y: auto; background: #0f172a; transition: background 0.3s; }
        body.light-mode .main-content { background: #f8fafc; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%); border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); transition: background 0.3s, border-color 0.3s; }
        body.light-mode .card { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); }
        .card-title { font-size: 0.875rem; color: #94a3b8; font-weight: 600; margin-bottom: 1rem; transition: color 0.3s; }
        body.light-mode .card-title { color: #475569; }
        .card-value { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; transition: color 0.3s; }
        body.light-mode .card-value { color: #1e293b; }
        .card-subtitle { font-size: 0.875rem; color: #64748b; transition: color 0.3s; }
        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; color: #f1f5f9; transition: color 0.3s; }
        body.light-mode .section-title { color: #1e293b; }
        .data-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; transition: background 0.3s, border-color 0.3s; }
        body.light-mode .data-table { background: #ffffff; border: 1px solid #e2e8f0; }
        .data-table th { background: #334155; padding: 1rem; text-align: left; font-size: 0.875rem; color: #94a3b8; font-weight: 600; transition: background 0.3s, color 0.3s; }
        body.light-mode .data-table th { background: #f1f5f9; color: #475569; }
        .data-table td { padding: 1rem; border-top: 1px solid #334155; font-size: 0.875rem; transition: border-color 0.3s, color 0.3s; color: var(--text-primary); }
        body.light-mode .data-table td { border-top: 1px solid #e2e8f0; color: #1e293b; }
        .data-table tr:hover { background: rgba(51, 65, 85, 0.3); }
        body.light-mode .data-table tr:hover { background: rgba(241, 245, 249, 0.5); }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .status-error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-info { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-active { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-down { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .usage-bar { height: 20px; background: #334155; border-radius: 4px; overflow: hidden; position: relative; }
        body.light-mode .usage-bar { background: #e2e8f0; }
        .usage-bar-fill { height: 100%; transition: width 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; color: white; }
        .usage-green { background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%); }
        .usage-yellow { background: linear-gradient(90deg, #eab308 0%, #f59e0b 100%); }
        .usage-red { background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%); }
        .usage-text { position: absolute; right: 0.5rem; color: var(--text-primary); font-size: 0.75rem; font-weight: 600; }
        body.light-mode .usage-text { color: #1e293b; }
        .log-entry { background: #1e293b; border-left: 3px solid #334155; padding: 1rem; margin-bottom: 0.5rem; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.85rem; }
        body.light-mode .log-entry { background: #ffffff; border-left: 3px solid #e2e8f0; }
        .log-entry.error { border-left-color: #ef4444; }
        .log-entry.warning { border-left-color: #f59e0b; }
        .log-entry.auth-log-entry { border-left-width: 4px; }
        .log-timestamp { color: #64748b; margin-right: 1rem; }
        .log-process { color: #8b5cf6; margin-right: 1rem; }
        .log-message { color: var(--text-primary); }
        body.light-mode .log-message { color: #1e293b; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; border: 1px solid #334155; border-radius: 12px; width: 90%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        body.light-mode .modal-content { background: #ffffff; border: 1px solid #e2e8f0; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        body.light-mode .modal-header { border-bottom: 1px solid #e2e8f0; }
        .modal-title { font-size: 1.25rem; font-weight: 600; color: #f1f5f9; }
        body.light-mode .modal-title { color: #1e293b; }
        .modal-close { background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; padding: 0.5rem; line-height: 1; transition: color 0.2s; }
        .modal-close:hover { color: #f1f5f9; }
        body.light-mode .modal-close:hover { color: #1e293b; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #334155; display: flex; gap: 1rem; justify-content: flex-end; }
        body.light-mode .modal-footer { border-top: 1px solid #e2e8f0; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
        .btn-secondary { background: #334155; color: var(--text-primary); }
        .btn-secondary:hover { background: #475569; }
        body.light-mode .btn-secondary { background: #e2e8f0; color: #1e293b; }
        body.light-mode .btn-secondary:hover { background: #cbd5e1; }
        .raw-content { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 1rem; font-family: 'Courier New', monospace; font-size: 0.875rem; line-height: 1.6; color: var(--text-primary); white-space: pre-wrap; word-break: break-all; max-height: 60vh; overflow-y: auto; }
        body.light-mode .raw-content { background: #f8fafc; border: 1px solid #e2e8f0; color: #1e293b; }
        .title-icon { cursor: pointer; margin-left: 0.5rem; color: #3b82f6; font-size: 1.25rem; vertical-align: middle; }
        .title-icon:hover { color: #60a5fa; }
        .search-box { width: 100%; padding: 0.75rem 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: var(--text-primary); font-size: 0.875rem; margin-bottom: 1.5rem; transition: background 0.3s, border-color 0.3s, color 0.3s; }
        .search-box:focus { outline: none; border-color: #3b82f6; }
        body.light-mode .search-box { background: #ffffff; border: 1px solid #e2e8f0; color: #1e293b; }
        .flags-toggle { color: #3b82f6; cursor: pointer; text-decoration: underline; font-size: 0.85rem; }
        .flags-toggle:hover { color: #60a5fa; }
        .flags-expanded { display: none; margin-top: 0.5rem; padding: 0.5rem; background: rgba(59, 130, 246, 0.1); border-radius: 4px; font-size: 0.8rem; color: #93c5fd; }
        body.light-mode .flags-expanded { background: rgba(59, 130, 246, 0.05); color: #3b82f6; }
        .flags-expanded.show { display: block; }
        .interface-name { display: flex; align-items: center; gap: 0.5rem; }
        .logo-subtitle,               
        #folder-path {
            font-size: 0.875rem;
            margin-top: 4px;
        }
        /* Configuration table styles for theme switching */
        .config-table {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }
        body.light-mode .config-table {
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }
        .config-row {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        body.light-mode .config-row {
            border-bottom: 1px solid #e2e8f0;
        }
        .config-row-even {
            background: #0f172a;
        }
        .config-row-odd {
            background: #1e293b;
        }
        body.light-mode .config-row-even {
            background: #f8fafc;
        }
        body.light-mode .config-row-odd {
            background: #ffffff;
        }
        .config-key {
            color: #8b5cf6;
            font-weight: 500;
        }
        body.light-mode .config-key {
            color: #7c3aed;
        }
        .config-value {
            color: #64748b;
        }
        body.light-mode .config-value {
            color: #475569;
        }
        /* Auth log specific styles */
        .auth-log-details {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .auth-event-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }
        .auth-event-sudo {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }
        .auth-event-ssh_success {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        .auth-event-ssh_failed {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .auth-event-login {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }
        .auth-event-auth_failure {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .auth-event-security {
            background: rgba(220, 38, 38, 0.3);
            color: #fca5a5;
        }
        .auth-event-other {
            background: rgba(100, 116, 139, 0.2);
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">SA</div>
            <div>
                <h1>Support Archive Analyzer</h1>
                <div class="logo-subtitle" id="folder-path">Loading...</div>
            </div>
        </div>
        <div style="display: flex; align-items: center;">
            <div class="archive-info" id="header-info"><div class="loading">Loading...</div></div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode"><span id="theme-icon">☀️</span></button>
        </div>
    </div>
    <div class="container" id="container">
        <aside class="sidebar" id="sidebar" style="position: relative;">
            <div class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">◀</div>
            <nav>
                <div class="nav-section"><div class="nav-section-title">Overview</div><div class="nav-item active" data-view="dashboard"><span>📊</span><span class="nav-item-text">Dashboard</span></div><div class="nav-item" data-view="issues"><span>⚠️</span><span class="nav-item-text">Issues</span></div></div>
                <div class="nav-section"><div class="nav-section-title">System</div><div class="nav-item" data-view="system"><span>💻</span><span class="nav-item-text">System Info</span></div><div class="nav-item" data-view="network"><span>🌐</span><span class="nav-item-text">Network</span></div><div class="nav-item" data-view="storage"><span>💾</span><span class="nav-item-text">Storage</span></div><div class="nav-item" data-view="database"><span>🗄️</span><span class="nav-item-text">Database</span></div></div>
                <div class="nav-section"><div class="nav-section-title">N2OS</div><div class="nav-item" data-view="n2os-config"><span>⚙️</span><span class="nav-item-text">N2OS Config</span></div><div class="nav-item" data-view="rc-conf"><span>🔧</span><span class="nav-item-text">RC Config</span></div><div class="nav-item" data-view="n2op-logs"><span>📋</span><span class="nav-item-text">Operations</span></div><div class="nav-item" data-view="health-events"><span>💊</span><span class="nav-item-text">Health Events</span></div></div>
                <div class="nav-section"><div class="nav-section-title">Logs</div><div class="nav-item" data-view="logs-syslog"><span>📝</span><span class="nav-item-text">System Logs</span></div><div class="nav-item" data-view="logs-nginx"><span>🌐</span><span class="nav-item-text">Nginx Logs</span></div><div class="nav-item" data-view="logs-auth"><span>🔐</span><span class="nav-item-text">Auth Logs</span></div></div>
                <div class="nav-section"><div class="nav-section-title">Processes</div><div class="nav-item" data-view="processes"><span>🔧</span><span class="nav-item-text">Process List</span></div></div>
            </nav>
        </aside>
        <main class="main-content" id="main-content"><div class="loading">Loading data...</div></main>
    </div>
    <div id="raw-modal" class="modal"><div class="modal-content"><div class="modal-header"><div class="modal-title" id="modal-title">Raw Configuration File</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="raw-content" id="modal-content"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="copyModalContent()">📋 Copy</button><button class="btn btn-secondary" onclick="downloadModalContent()">💾 Download</button></div></div></div>
    <script>
        let appData = {};
        let currentModalData = { content: '', filename: '' };

        async function init() {
            await loadData();
            showView('dashboard');
            setupNavigation();
            setupSidebarToggle();
            setupModalHandlers();
        }

        async function loadData() {
            try {
                const [metadata, overview, system, processes, network, storage, n2osConfig] = await Promise.all([
                    fetch('/api/metadata').then(r => r.json()),
                    fetch('/api/overview').then(r => r.json()),
                    fetch('/api/system').then(r => r.json()),
                    fetch('/api/processes').then(r => r.json()),
                    fetch('/api/network').then(r => r.json()),
                    fetch('/api/storage').then(r => r.json()),
                    fetch('/api/n2os-config').then(r => r.json()),
                ]);
                appData = { metadata, overview, system, processes, network, storage, n2osConfig };
                updateHeader();
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }

        function updateHeader() {
            const { metadata, system } = appData;
            
            // Update folder path
            const folderPath = metadata.ExtractedPath || 'N/A';
            document.getElementById('folder-path').textContent = `${folderPath}`;
            
            document.getElementById('header-info').innerHTML = `
                <div class="archive-info-item">
                    <span class="archive-info-label">Product</span>
                    <span class="archive-info-value">${system.Product || 'N/A'}</span>
                </div>
                <div class="archive-info-item">
                    <span class="archive-info-label">Version</span>
                    <span class="archive-info-value">${metadata.Version || 'N/A'}</span>
                </div>
                <div class="archive-info-item">
                    <span class="archive-info-label">Hostname</span>
                    <span class="archive-info-value">${system.Hostname || 'N/A'}</span>
                </div>
                <div class="archive-info-item">
                    <span class="archive-info-label">Platform</span>
                    <span class="archive-info-value">${system.Platform || 'N/A'}</span>
                </div>
            `;
        }

        function setupNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    showView(item.dataset.view);
                });
            });
        }

        function setupSidebarToggle() {
            const toggle = document.getElementById('sidebar-toggle');
            const sidebar = document.getElementById('sidebar');
            const container = document.getElementById('container');
            let isCollapsed = false;
            toggle.addEventListener('click', () => {
                isCollapsed = !isCollapsed;
                if (isCollapsed) {
                    sidebar.classList.add('collapsed');
                    container.classList.add('sidebar-collapsed');
                    toggle.textContent = '▶';
                    toggle.title = 'Expand sidebar';
                } else {
                    sidebar.classList.remove('collapsed');
                    container.classList.remove('sidebar-collapsed');
                    toggle.textContent = '◀';
                    toggle.title = 'Collapse sidebar';
                }
            });
        }

        async function showView(view) {
            const content = document.getElementById('main-content');
            switch(view) {
                case 'dashboard': content.innerHTML = renderDashboard(); break;
                case 'issues': const issues = await fetch('/api/issues').then(r => r.json()); content.innerHTML = renderIssues(issues); break;
                case 'system': content.innerHTML = renderSystem(); break;
                case 'network': content.innerHTML = renderNetwork(); break;
                case 'storage': content.innerHTML = renderStorage(); break;
                case 'database': const database = await fetch('/api/database').then(r => r.json()); content.innerHTML = renderDatabase(database); break;
                case 'logs-syslog': const syslog = await fetch('/api/logs?type=syslog').then(r => r.json()); content.innerHTML = renderLogs(syslog, 'System Logs'); break;
                case 'logs-nginx': const nginx = await fetch('/api/logs?type=nginx').then(r => r.json()); content.innerHTML = renderNginxLogs(nginx); break;
                case 'logs-auth': const auth = await fetch('/api/logs?type=auth').then(r => r.json()); content.innerHTML = renderAuthLogs(auth); break;
                case 'processes': content.innerHTML = renderProcesses(); break;
                case 'n2os-config': content.innerHTML = renderN2OSConfig(); setupN2OSSearch(); break;
                case 'rc-conf': content.innerHTML = renderRcConf(); setupRcConfSearch(); break;
                case 'n2op-logs': const n2oplogs = await fetch('/api/n2op-logs').then(r => r.json()); content.innerHTML = renderN2OpLogs(n2oplogs); setupN2OpLogsHandlers(); break;

-space: pre-wrap; font-family: monospace; max-height: 300px; overflow-y: auto;">${pool.Errors}</div></div>` : ''}</div>`; }).join('')}${!isVSeries && (storage.DiskInfo || []).length > 0 ? `<div class="section-title">Disk Health (SMART)</div><table class="data-table"><thead><tr><th>Device</th><th>Model</th><th>Capacity</th><th>Health</th><th>Temperature</th><th>Power On Hours</th></tr></thead><tbody>${storage.DiskInfo.map(disk => `<tr><td>${disk.Device}</td><td>${disk.Model || 'N/A'}</td><td>${disk.Capacity || 'N/A'}</td><td><span class="status-badge ${disk.Health === 'PASSED' ? 'status-info' : 'status-error'}">${disk.Health || 'Unknown'}</span></td><td>${disk.Temperature ? disk.Temperature + '°C' : 'N/A'}</td><td>${disk.PowerOnHours || 'N/A'}</td></tr>`).join('')}</tbody></table>` : ''}`;

        let dbSortColumn = 'size';
        let dbSortDirection = 'desc';
        let dbCurrentData = null;

        function renderDatabase(database) {
            if (!database || !database.Tables || database.Tables.length === 0) {
                return '<div class="section-title">Database Diagnostics</div><div class="card"><p>No database diagnostic data available.</p></div>';
            }

            // Store data for sorting
            dbCurrentData = database;

            const sortedTables = sortDatabaseTables([...database.Tables], dbSortColumn, dbSortDirection);

            return `
                <div class="section-title">PostgreSQL Database Diagnostics</div>

                <div class="card" style="margin-bottom: 1.5rem;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                        <div>
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.5rem;">Total Database Size</div>

                        </div>
                        <div>
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.5rem;">Total Tables</div>
                            <div style="font-size: 1.5rem; font-weight: 600; color: var(--text-primary);">${database.Tables.length}</div>
                        </div>
                        <div>
                            <div style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.5rem;">Issues Detected</div>
                            <div style="font-size: 1.5rem; font-weight: 600; color: ${database.IssuesCount > 0 ? '#f59e0b' : '#22c55e'};">${database.IssuesCount}</div>
                        </div>
                    </div>
                </div>

                <div class="section-title">Database Tables</div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th onclick="sortDatabaseBy('name')" style="cursor: pointer; user-select: none;">
                                Table Name ${dbSortColumn === 'name' ? (dbSortDirection === 'asc' ? '▲' : '▼') : ''}
                            </th>
                            <th onclick="sortDatabaseBy('size')" style="cursor: pointer; user-select: none;">
                                Size ${dbSortColumn === 'size' ? (dbSortDirection === 'asc' ? '▲' : '▼') : ''}
                            </th>
                            <th onclick="sortDatabaseBy('live')" style="cursor: pointer; user-select: none;">
                                Live Tuples ${dbSortColumn === 'live' ? (dbSortDirection === 'asc' ? '▲' : '▼') : ''}
                            </th>
                            <th onclick="sortDatabaseBy('dead')" style="cursor: pointer; user-select: none;">
                                Dead Tuples ${dbSortColumn === 'dead' ? (dbSortDirection === 'asc' ? '▲' : '▼') : ''}
                            </th>
                            <th>Last Vacuum</th>
                            <th>Last Autovacuum</th>
                            <th onclick="sortDatabaseBy('status')" style="cursor: pointer; user-select: none;">
                                Status ${dbSortColumn === 'status' ? (dbSortDirection === 'asc' ? '▲' : '▼') : ''}
                            </th>
                        </tr>
                    </thead>
                    <tbody id="db-table-body">
                        ${sortedTables.map(table => renderDatabaseTableRow(table)).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderDatabaseTableRow(table) {
            const rowStyle = table.IsOversized || table.NeedsVacuum ? 'background: rgba(245, 158, 11, 0.1);' : '';
            const sizeColor = table.IsOversized ? '#f59e0b' : '#e2e8f0';
            const deadTuplesColor = table.NeedsVacuum ? '#f59e0b' : '#94a3b8';

            let statusBadge = '';
            if (table.IsOversized && table.NeedsVacuum) {
                statusBadge = '<span style="background: rgba(245, 158, 11, 0.2); color: #fbbf24; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">⚠️ OVERSIZED + VACUUM</span>';
            } else if (table.IsOversized) {
                statusBadge = '<span style="background: rgba(245, 158, 11, 0.2); color: #fbbf24; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">⚠️ OVERSIZED</span>';
            } else if (table.NeedsVacuum) {
                statusBadge = '<span style="background: rgba(245, 158, 11, 0.2); color: #fbbf24; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">⚠️ NEEDS VACUUM</span>';
            } else {
                statusBadge = '<span style="color: #22c55e;">✓ OK</span>';
            }

            return `
                <tr style="${rowStyle}">
                    <td style="font-weight: 500;">${table.TableName}</td>
                    <td style="color: ${sizeColor}; font-weight: 500;">${table.Size}</td>
                    <td style="color: #94a3b8;">${table.LiveTuples > 0 ? table.LiveTuples.toLocaleString() : '-'}</td>
                    <td style="color: ${deadTuplesColor}; font-weight: ${table.NeedsVacuum ? '600' : 'normal'};">${table.DeadTuples > 0 ? table.DeadTuples.toLocaleString() : '-'}</td>
                    <td style="color: #94a3b8; font-size: 0.875rem;">${table.LastVacuum || '-'}</td>
                    <td style="color: #94a3b8; font-size: 0.875rem;">${table.LastAutovacuum || '-'}</td>
                    <td>${statusBadge}</td>
                </tr>
            `;
        }

        function sortDatabaseBy(column) {
            if (dbSortColumn === column) {
                // Toggle direction if same column
                dbSortDirection = dbSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                // New column, default to descending (except for name)
                dbSortColumn = column;
                dbSortDirection = column === 'name' ? 'asc' : 'desc';
            }

            if (dbCurrentData) {
                const sortedTables = sortDatabaseTables([...dbCurrentData.Tables], dbSortColumn, dbSortDirection);
                const tbody = document.getElementById('db-table-body');
                if (tbody) {
                    tbody.innerHTML = sortedTables.map(table => renderDatabaseTableRow(table)).join('');
                }
            }
        }

        function sortDatabaseTables(tables, column, direction) {
            const sorted = tables.sort((a, b) => {
                let aVal, bVal;

                switch (column) {
                    case 'name':
                        aVal = a.TableName.toLowerCase();
                        bVal = b.TableName.toLowerCase();
                        return direction === 'asc'
                            ? aVal.localeCompare(bVal)
                            : bVal.localeCompare(aVal);
                    case 'size':
                        aVal = a.SizeBytes;
                        bVal = b.SizeBytes;
                        break;
                    case 'live':
                        aVal = a.LiveTuples;
                        bVal = b.LiveTuples;
                        break;
                    case 'dead':
                        aVal = a.DeadTuples;
                        bVal = b.DeadTuples;
                        break;
                    case 'status':
                        // Sort by issue severity: both issues > oversized > vacuum > ok
                        aVal = (a.IsOversized && a.NeedsVacuum) ? 3 : (a.IsOversized ? 2 : (a.NeedsVacuum ? 1 : 0));
                        bVal = (b.IsOversized && b.NeedsVacuum) ? 3 : (b.IsOversized ? 2 : (b.NeedsVacuum ? 1 : 0));
                        break;
                    default:
                        aVal = a.SizeBytes;
                        bVal = b.SizeBytes;
                }

                return direction === 'asc' ? aVal - bVal : bVal - aVal;
            });

            return sorted;
        }

                       '</div>' +

            // Add details section if there are additional fields
            if (log.User || log.SudoUser || log.SourceIP || log.Command) {

                        <option value="appliance">Appliance</option>
                        <option value="system">System</option>
                        <option value="replication">Replication</option>
                        <option value="upgrade">Upgrade</option>
                        <option value="other">Other</option>
                    </select>
                    <select id="health-severity" style="padding: 0.75rem; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: var(--text-primary);">
                        <option value="">All Severities</option>
                        <option value="info">Info</option>
                        <option value="warning">Warning</option>
                        <option value="error">Error</option>
                        <option value="critical">Critical</option>
                    </select>
                    <select id="health-appliance" style="padding: 0.75rem; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: var(--text-primary);">
                        <option value="">All Appliances</option>
                        ${[...new Set(events.map(e => e.ApplianceHost).filter(Boolean))].sort().map(host =>
                            `<option value="${host}">${host}</option>`
                        ).join('')}
                    </select>
                    <select id="health-page-size" style="padding: 0.75rem; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: var(--text-primary);">
                        <option value="25">25 per page</option>
                        <option value="50" selected>50 per page</option>
                        <option value="100">100 per page</option>
                        <option value="200">200 per page</option>
                    </select>
                </div>

                <div id="health-events-container"></div>
                <div id="health-pagination" style="margin-top: 1.5rem; display: flex; justify-content: center; align-items: center; gap: 1rem;"></div>
            `;
        }

        function getHealthEventStats(events) {
            const stats = {
                byCategory: {},
                bySeverity: {},
                uniqueAppliances: new Set()
            };

            events.forEach(event => {
                stats.byCategory[event.Category] = (stats.byCategory[event.Category] || 0) + 1;
                stats.bySeverity[event.Severity] = (stats.bySeverity[event.Severity] || 0) + 1;
                if (event.ApplianceHost) {
                    stats.uniqueAppliances.add(event.ApplianceHost);
                }
            });

            stats.uniqueAppliances = stats.uniqueAppliances.size;
            return stats;
        }

        function renderHealthEventsPage() {
            const container = document.getElementById('health-events-container');
            const pagination = document.getElementById('health-pagination');

            if (!container || !pagination) return;

            const totalPages = Math.ceil(healthFilteredEvents.length / healthPageSize);
            const startIdx = (healthCurrentPage - 1) * healthPageSize;
            const endIdx = Math.min(startIdx + healthPageSize, healthFilteredEvents.length);
            const pageEvents = healthFilteredEvents.slice(startIdx, endIdx);

            // Render event table
            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden;">
                    <thead>
                        <tr style="background: #0f172a; border-bottom: 2px solid #334155;">
                            <th style="padding: 0.5rem 0.75rem; text-align: left; color: #94a3b8; font-weight: 600; font-size: 0.875rem;">Timestamp</th>
                            <th style="padding: 0.5rem 0.75rem; text-align: left; color: #94a3b8; font-weight: 600; font-size: 0.875rem;">Appliance</th>
                            <th style="padding: 0.5rem 0.75rem; text-align: left; color: #94a3b8; font-weight: 600; font-size: 0.875rem;">Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${pageEvents.map(event => renderHealthEventEntry(event)).join('')}
                    </tbody>
                </table>
            `;

            // Render pagination controls
            const prevDisabled = healthCurrentPage === 1;
            const nextDisabled = healthCurrentPage === totalPages || totalPages === 0;

            pagination.innerHTML = `
                <button class="btn btn-secondary" onclick="healthChangePage(${healthCurrentPage - 1})" ${prevDisabled ? 'disabled' : ''}>← Previous</button>
                <span style="color: var(--text-primary);">Page ${healthCurrentPage} of ${totalPages || 1} (${healthFilteredEvents.length} events)</span>
                <button class="btn btn-secondary" onclick="healthChangePage(${healthCurrentPage + 1})" ${nextDisabled ? 'disabled' : ''}>Next →</button>
            `;
        }

        function renderHealthEventEntry(event) {
            // Build description with additional details
            let description = event.Description;
            if (event.Port) {
                description += ` (Port: ${event.Port})`;
            }
            if (event.ApplianceIP) {
                description += ` [${event.ApplianceIP}]`;
            }

            return `
                <tr style="border-bottom: 1px solid #334155;">
                    <td style="padding: 0.4rem 0.75rem; color: #94a3b8; font-size: 0.875rem; white-space: nowrap;">${new Date(event.Timestamp).toUTCString()}</td>
                    <td style="padding: 0.4rem 0.75rem; color: #8b5cf6; font-size: 0.875rem;">${event.ApplianceHost || '-'}</td>
                    <td style="padding: 0.4rem 0.75rem; color: var(--text-primary); font-size: 0.875rem;">${description}</td>
                </tr>
            `;
        }

        function healthChangePage(page) {
            const totalPages = Math.ceil(healthFilteredEvents.length / healthPageSize);
            if (page < 1 || page > totalPages) return;
            healthCurrentPage = page;
            renderHealthEventsPage();
        }

        function setupHealthEventsHandlers() {
            const searchBox = document.getElementById('health-search');
            const categorySelect = document.getElementById('health-category');
            const severitySelect = document.getElementById('health-severity');
            const applianceSelect = document.getElementById('health-appliance');
            const pageSizeSelect = document.getElementById('health-page-size');

            function filterHealthEvents() {
                const query = searchBox.value.toLowerCase();
                const category = categorySelect.value;
                const severity = severitySelect.value;
                const appliance = applianceSelect.value;

                healthFilteredEvents = healthAllEvents.filter(event => {
                    const matchesCategory = !category || event.Category === category;
                    const matchesSeverity = !severity || event.Severity === severity;
                    const matchesAppliance = !appliance || event.ApplianceHost === appliance;
                    const matchesSearch = !query ||
                        event.Description.toLowerCase().includes(query) ||
                        (event.ApplianceHost && event.ApplianceHost.toLowerCase().includes(query)) ||
                        (event.Port && event.Port.toLowerCase().includes(query));
                    return matchesCategory && matchesSeverity && matchesAppliance && matchesSearch;
                });

                healthCurrentPage = 1;
                renderHealthEventsPage();
            }

            searchBox.addEventListener('input', filterHealthEvents);
            categorySelect.addEventListener('change', filterHealthEvents);
            severitySelect.addEventListener('change', filterHealthEvents);
            applianceSelect.addEventListener('change', filterHealthEvents);
            pageSizeSelect.addEventListener('change', (e) => {
                healthPageSize = parseInt(e.target.value);
                healthCurrentPage = 1;
                renderHealthEventsPage();
            });

            // Initial render
            renderHealthEventsPage();
        }

        init();
    </script>
</body>
</html>
